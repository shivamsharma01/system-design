# Full stack: frontend (nginx) + backend (Spring Boot) + PostgreSQL.
# The frontend works standalone; backend + db are optional.
#
#   docker compose up --build
#   open http://localhost:8081
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: systemdesign
      POSTGRES_USER: systemdesign
      POSTGRES_PASSWORD: systemdesign
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U systemdesign']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://db:5432/systemdesign
      DATABASE_USERNAME: systemdesign
      DATABASE_PASSWORD: systemdesign
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - '8081:80'
    depends_on:
      - backend

volumes:
  pgdata:
