<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SystemDesign.dev — Learn Real-World System Design</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="An open-source platform for learning the system design of real-world applications like Netflix, WhatsApp, and Uber."
    />
    <meta name="theme-color" content="#e50914" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@400;500;600;700&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />

    <!-- Apply the persisted theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sd-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <app-root></app-root>
  </body>
</html>
