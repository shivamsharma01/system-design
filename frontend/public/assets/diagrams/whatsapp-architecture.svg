<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="WhatsApp messaging architecture diagram">
  <rect width="880" height="380" fill="#0b141a" rx="12"/>
  <text x="440" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">WhatsApp Message Path</text>

  <!-- Sender -->
  <g>
    <rect x="36" y="150" width="140" height="80" rx="10" fill="#1f2c33" stroke="#25d366" stroke-width="2"/>
    <text x="106" y="186" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Sender</text>
    <text x="106" y="208" fill="#8aa0a6" font-size="12" text-anchor="middle">WebSocket</text>
  </g>

  <!-- Connection layer -->
  <g>
    <rect x="236" y="60" width="190" height="120" rx="10" fill="#11261d" stroke="#25d366" stroke-width="2"/>
    <text x="331" y="96" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Connection Servers</text>
    <text x="331" y="118" fill="#8aa0a6" font-size="12" text-anchor="middle">Erlang/OTP, ~1M conns</text>
    <text x="331" y="138" fill="#8aa0a6" font-size="12" text-anchor="middle">per node, stateful</text>
    <text x="331" y="160" fill="#8aa0a6" font-size="12" text-anchor="middle">presence + sessions</text>
  </g>

  <!-- Router -->
  <g>
    <rect x="236" y="220" width="190" height="100" rx="10" fill="#1f2c33" stroke="#34b7f1" stroke-width="2"/>
    <text x="331" y="256" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Message Router</text>
    <text x="331" y="278" fill="#8aa0a6" font-size="12" text-anchor="middle">session registry lookup</text>
    <text x="331" y="296" fill="#8aa0a6" font-size="12" text-anchor="middle">fan-out + receipts</text>
  </g>

  <!-- Store -->
  <g>
    <rect x="500" y="60" width="180" height="100" rx="10" fill="#1f2c33" stroke="#a855f7" stroke-width="2"/>
    <text x="590" y="96" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Message Store</text>
    <text x="590" y="118" fill="#8aa0a6" font-size="12" text-anchor="middle">Cassandra + inbox</text>
    <text x="590" y="136" fill="#8aa0a6" font-size="12" text-anchor="middle">store-and-forward</text>
  </g>

  <!-- Push -->
  <g>
    <rect x="500" y="220" width="180" height="100" rx="10" fill="#1f2c33" stroke="#f59e0b" stroke-width="2"/>
    <text x="590" y="256" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Push (APNs/FCM)</text>
    <text x="590" y="278" fill="#8aa0a6" font-size="12" text-anchor="middle">wake offline devices</text>
  </g>

  <!-- Recipient -->
  <g>
    <rect x="724" y="150" width="120" height="80" rx="10" fill="#1f2c33" stroke="#25d366" stroke-width="2"/>
    <text x="784" y="186" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Recipient</text>
    <text x="784" y="208" fill="#8aa0a6" font-size="12" text-anchor="middle">online/offline</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8aa0a6"/>
    </marker>
  </defs>
  <line x1="176" y1="180" x2="234" y2="130" stroke="#25d366" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="178" y="145" fill="#8aa0a6" font-size="11">1. send</text>
  <line x1="331" y1="180" x2="331" y2="218" stroke="#34b7f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="338" y="205" fill="#8aa0a6" font-size="11">2. route</text>
  <line x1="426" y1="245" x2="498" y2="120" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="452" y="175" fill="#8aa0a6" font-size="11">3a. persist</text>
  <line x1="426" y1="270" x2="498" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="438" y="262" fill="#8aa0a6" font-size="11">3b. push</text>
  <line x1="680" y1="110" x2="722" y2="170" stroke="#25d366" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="690" y="150" fill="#8aa0a6" font-size="11">4. deliver</text>
</svg>
