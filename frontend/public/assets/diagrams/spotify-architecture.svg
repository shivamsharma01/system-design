<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Spotify music streaming and discovery architecture diagram">
  <rect width="880" height="380" fill="#191414" rx="12"/>
  <text x="440" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Spotify: Stream &amp; Discover</text>

  <!-- Listener -->
  <g>
    <rect x="32" y="150" width="130" height="80" rx="10" fill="#282828" stroke="#1db954" stroke-width="2"/>
    <text x="97" y="184" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Listener</text>
    <text x="97" y="204" fill="#b3b3b3" font-size="11" text-anchor="middle">play / search</text>
  </g>

  <!-- Gateway -->
  <g>
    <rect x="200" y="150" width="130" height="80" rx="10" fill="#222" stroke="#1db954" stroke-width="2"/>
    <text x="265" y="184" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">API Gateway</text>
    <text x="265" y="204" fill="#b3b3b3" font-size="11" text-anchor="middle">auth + route</text>
  </g>

  <!-- Streaming -->
  <g>
    <rect x="368" y="50" width="180" height="90" rx="10" fill="#222" stroke="#f59e0b" stroke-width="2"/>
    <text x="458" y="82" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Streaming Svc</text>
    <text x="458" y="102" fill="#b3b3b3" font-size="11" text-anchor="middle">track URL + license</text>
    <text x="458" y="120" fill="#b3b3b3" font-size="11" text-anchor="middle">prefetch / cache</text>
  </g>

  <!-- Catalog/search -->
  <g>
    <rect x="368" y="150" width="180" height="80" rx="10" fill="#222" stroke="#22c55e" stroke-width="2"/>
    <text x="458" y="182" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Catalog / Search</text>
    <text x="458" y="202" fill="#b3b3b3" font-size="11" text-anchor="middle">tracks, albums, ES</text>
  </g>

  <!-- Playlist -->
  <g>
    <rect x="368" y="240" width="180" height="80" rx="10" fill="#222" stroke="#3b82f6" stroke-width="2"/>
    <text x="458" y="272" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Playlist Svc</text>
    <text x="458" y="292" fill="#b3b3b3" font-size="11" text-anchor="middle">user libraries</text>
  </g>

  <!-- Audio store + CDN -->
  <g>
    <rect x="586" y="50" width="180" height="90" rx="10" fill="#222" stroke="#f59e0b" stroke-width="2"/>
    <text x="676" y="82" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Audio CDN</text>
    <text x="676" y="102" fill="#b3b3b3" font-size="11" text-anchor="middle">Ogg/AAC segments</text>
    <text x="676" y="120" fill="#b3b3b3" font-size="11" text-anchor="middle">edge cache</text>
  </g>

  <!-- Reco -->
  <g>
    <rect x="586" y="160" width="180" height="90" rx="10" fill="#222" stroke="#a855f7" stroke-width="2"/>
    <text x="676" y="192" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Recommendations</text>
    <text x="676" y="212" fill="#b3b3b3" font-size="11" text-anchor="middle">collaborative + audio</text>
    <text x="676" y="230" fill="#b3b3b3" font-size="11" text-anchor="middle">Discover Weekly</text>
  </g>

  <!-- Events -->
  <g>
    <rect x="586" y="270" width="180" height="60" rx="10" fill="#15202b" stroke="#6366f1" stroke-width="2"/>
    <text x="676" y="298" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Kafka: play events</text>
    <text x="676" y="316" fill="#b3b3b3" font-size="11" text-anchor="middle">’ analytics / ML</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b3b3b3"/>
    </marker>
  </defs>
  <line x1="162" y1="190" x2="198" y2="190" stroke="#1db954" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="180" x2="366" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="150" fill="#b3b3b3" font-size="10">play</text>
  <line x1="330" y1="190" x2="366" y2="190" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="200" x2="366" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="548" y1="95" x2="584" y2="95" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="552" y="86" fill="#b3b3b3" font-size="10">segments</text>
  <line x1="548" y1="190" x2="584" y2="195" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
