<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="YouTube upload, transcoding, and delivery pipeline diagram">
  <rect width="880" height="380" fill="#181818" rx="12"/>
  <text x="440" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">YouTube: Upload ’ Transcode ’ Deliver</text>

  <!-- Creator -->
  <g>
    <rect x="32" y="70" width="130" height="78" rx="10" fill="#282828" stroke="#ff0000" stroke-width="2"/>
    <text x="97" y="104" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Creator</text>
    <text x="97" y="124" fill="#aaaaaa" font-size="11" text-anchor="middle">uploads video</text>
  </g>

  <!-- Upload + raw store -->
  <g>
    <rect x="200" y="60" width="160" height="98" rx="10" fill="#202020" stroke="#ff0000" stroke-width="2"/>
    <text x="280" y="92" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Upload Service</text>
    <text x="280" y="112" fill="#aaaaaa" font-size="11" text-anchor="middle">resumable upload</text>
    <text x="280" y="130" fill="#aaaaaa" font-size="11" text-anchor="middle">’ raw blob store</text>
  </g>

  <!-- Transcoding pipeline -->
  <g>
    <rect x="390" y="60" width="190" height="98" rx="10" fill="#202020" stroke="#a855f7" stroke-width="2"/>
    <text x="485" y="88" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Transcoding Pipeline</text>
    <text x="485" y="108" fill="#aaaaaa" font-size="11" text-anchor="middle">chunk ’ parallel encode</text>
    <text x="485" y="126" fill="#aaaaaa" font-size="11" text-anchor="middle">ABR ladder + formats</text>
    <text x="485" y="144" fill="#aaaaaa" font-size="11" text-anchor="middle">(via Kafka workers)</text>
  </g>

  <!-- Processed store -->
  <g>
    <rect x="610" y="60" width="160" height="98" rx="10" fill="#202020" stroke="#3b82f6" stroke-width="2"/>
    <text x="690" y="92" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Processed Store</text>
    <text x="690" y="112" fill="#aaaaaa" font-size="11" text-anchor="middle">segments + manifests</text>
    <text x="690" y="130" fill="#aaaaaa" font-size="11" text-anchor="middle">’ CDN</text>
  </g>

  <!-- CDN -->
  <g>
    <rect x="610" y="210" width="160" height="92" rx="10" fill="#202020" stroke="#f59e0b" stroke-width="2"/>
    <text x="690" y="244" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">CDN (edge)</text>
    <text x="690" y="264" fill="#aaaaaa" font-size="11" text-anchor="middle">cache hot segments</text>
    <text x="690" y="282" fill="#aaaaaa" font-size="11" text-anchor="middle">ABR streaming</text>
  </g>

  <!-- Metadata / views -->
  <g>
    <rect x="200" y="210" width="160" height="92" rx="10" fill="#202020" stroke="#22c55e" stroke-width="2"/>
    <text x="280" y="244" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Metadata</text>
    <text x="280" y="264" fill="#aaaaaa" font-size="11" text-anchor="middle">video DB + search</text>
    <text x="280" y="282" fill="#aaaaaa" font-size="11" text-anchor="middle">view counts (stream)</text>
  </g>

  <!-- Viewer -->
  <g>
    <rect x="390" y="210" width="160" height="92" rx="10" fill="#202020" stroke="#22c55e" stroke-width="2"/>
    <text x="470" y="244" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Viewer</text>
    <text x="470" y="264" fill="#aaaaaa" font-size="11" text-anchor="middle">watch + search</text>
    <text x="470" y="282" fill="#aaaaaa" font-size="11" text-anchor="middle">recommendations</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#aaaaaa"/>
    </marker>
  </defs>
  <line x1="162" y1="106" x2="198" y2="106" stroke="#ff0000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="108" x2="388" y2="108" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="108" x2="608" y2="108" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="158" x2="690" y2="208" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="696" y="188" fill="#aaaaaa" font-size="10">publish</text>
  <line x1="608" y1="256" x2="552" y2="256" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="556" y="248" fill="#aaaaaa" font-size="10">stream</text>
  <line x1="390" y1="256" x2="362" y2="256" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
