<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 390" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Distributed cache architecture with consistent hashing ring">
  <rect width="880" height="390" fill="#1a0a0a" rx="12"/>
  <text x="440" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Distributed Cache: Consistent Hashing Ring</text>

  <!-- Client -->
  <g>
    <rect x="32" y="160" width="130" height="80" rx="10" fill="#2a1010" stroke="#dc2626" stroke-width="2"/>
    <text x="97" y="194" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Client</text>
    <text x="97" y="214" fill="#d4a3a3" font-size="11" text-anchor="middle">GET/SET key</text>
  </g>

  <!-- Router / smart client -->
  <g>
    <rect x="190" y="160" width="130" height="80" rx="10" fill="#2a1010" stroke="#f59e0b" stroke-width="2"/>
    <text x="255" y="188" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Smart Client</text>
    <text x="255" y="208" fill="#d4a3a3" font-size="11" text-anchor="middle">hash(key)</text>
    <text x="255" y="224" fill="#d4a3a3" font-size="11" text-anchor="middle">’ node</text>
  </g>

  <!-- Ring -->
  <g>
    <circle cx="560" cy="195" r="120" fill="none" stroke="#5a2a2a" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="560" y="195" fill="#7a5a5a" font-size="12" text-anchor="middle">hash ring</text>
    <text x="560" y="212" fill="#7a5a5a" font-size="11" text-anchor="middle">0 & 2^32-1</text>

    <!-- Nodes on ring -->
    <g>
      <circle cx="560" cy="75" r="26" fill="#2a1010" stroke="#22c55e" stroke-width="2"/>
      <text x="560" y="80" fill="#fff" font-size="12" text-anchor="middle">N1</text>
    </g>
    <g>
      <circle cx="664" cy="135" r="26" fill="#2a1010" stroke="#22c55e" stroke-width="2"/>
      <text x="664" y="140" fill="#fff" font-size="12" text-anchor="middle">N2</text>
    </g>
    <g>
      <circle cx="664" cy="255" r="26" fill="#2a1010" stroke="#22c55e" stroke-width="2"/>
      <text x="664" y="260" fill="#fff" font-size="12" text-anchor="middle">N3</text>
    </g>
    <g>
      <circle cx="560" cy="315" r="26" fill="#2a1010" stroke="#22c55e" stroke-width="2"/>
      <text x="560" y="320" fill="#fff" font-size="12" text-anchor="middle">N4</text>
    </g>
    <g>
      <circle cx="456" cy="255" r="26" fill="#2a1010" stroke="#22c55e" stroke-width="2"/>
      <text x="456" y="260" fill="#fff" font-size="12" text-anchor="middle">N5</text>
    </g>
    <g>
      <circle cx="456" cy="135" r="26" fill="#2a1010" stroke="#3b82f6" stroke-width="2"/>
      <text x="456" y="140" fill="#fff" font-size="12" text-anchor="middle">vN</text>
    </g>
  </g>

  <!-- Replica note -->
  <text x="560" y="378" fill="#d4a3a3" font-size="11" text-anchor="middle">key ’ first node clockwise; replicated to next N-1 nodes (RF=3)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d4a3a3"/>
    </marker>
  </defs>
  <line x1="162" y1="200" x2="188" y2="200" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="190" x2="432" y2="150" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="160" fill="#d4a3a3" font-size="10">route to owner</text>
</svg>
