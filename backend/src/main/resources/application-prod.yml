spring:
  # Production profile uses PostgreSQL. Provide credentials via environment vars.
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/systemdesign}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:systemdesign}
    password: ${DATABASE_PASSWORD:systemdesign}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
