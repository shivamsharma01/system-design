<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Twitter/X home timeline fan-out architecture diagram">
  <rect width="880" height="380" fill="#0f1419" rx="12"/>
  <text x="440" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">X (Twitter) Home Timeline</text>

  <!-- Author -->
  <g>
    <rect x="36" y="150" width="140" height="80" rx="10" fill="#1a2733" stroke="#1d9bf0" stroke-width="2"/>
    <text x="106" y="186" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Author</text>
    <text x="106" y="208" fill="#8b98a5" font-size="12" text-anchor="middle">posts a tweet</text>
  </g>

  <!-- Write API / Fan-out -->
  <g>
    <rect x="232" y="60" width="200" height="120" rx="10" fill="#15202b" stroke="#1d9bf0" stroke-width="2"/>
    <text x="332" y="96" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Write Path</text>
    <text x="332" y="118" fill="#8b98a5" font-size="12" text-anchor="middle">Tweet Service ’ Kafka</text>
    <text x="332" y="138" fill="#8b98a5" font-size="12" text-anchor="middle">Fan-out workers</text>
    <text x="332" y="158" fill="#8b98a5" font-size="12" text-anchor="middle">push to followers</text>
  </g>

  <!-- Tweet store -->
  <g>
    <rect x="232" y="220" width="200" height="100" rx="10" fill="#1a2733" stroke="#a855f7" stroke-width="2"/>
    <text x="332" y="256" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Tweet Store</text>
    <text x="332" y="278" fill="#8b98a5" font-size="12" text-anchor="middle">Manhattan / Cassandra</text>
    <text x="332" y="296" fill="#8b98a5" font-size="12" text-anchor="middle">source of truth</text>
  </g>

  <!-- Timeline cache -->
  <g>
    <rect x="500" y="60" width="190" height="120" rx="10" fill="#1a2733" stroke="#22c55e" stroke-width="2"/>
    <text x="595" y="96" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Timeline Cache</text>
    <text x="595" y="118" fill="#8b98a5" font-size="12" text-anchor="middle">Redis: per-user</text>
    <text x="595" y="138" fill="#8b98a5" font-size="12" text-anchor="middle">precomputed list</text>
    <text x="595" y="158" fill="#8b98a5" font-size="12" text-anchor="middle">of tweet IDs</text>
  </g>

  <!-- Celebrity pull -->
  <g>
    <rect x="500" y="220" width="190" height="100" rx="10" fill="#1a2733" stroke="#f59e0b" stroke-width="2"/>
    <text x="595" y="252" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Celebrity Path</text>
    <text x="595" y="274" fill="#8b98a5" font-size="12" text-anchor="middle">pull + merge at read</text>
    <text x="595" y="292" fill="#8b98a5" font-size="12" text-anchor="middle">(hybrid fan-out)</text>
  </g>

  <!-- Reader -->
  <g>
    <rect x="738" y="150" width="110" height="80" rx="10" fill="#1a2733" stroke="#1d9bf0" stroke-width="2"/>
    <text x="793" y="186" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Reader</text>
    <text x="793" y="208" fill="#8b98a5" font-size="12" text-anchor="middle">GET /home</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b98a5"/>
    </marker>
  </defs>
  <line x1="176" y1="180" x2="230" y2="130" stroke="#1d9bf0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="178" y="145" fill="#8b98a5" font-size="11">1. post</text>
  <line x1="332" y1="180" x2="332" y2="218" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="338" y="205" fill="#8b98a5" font-size="11">persist</text>
  <line x1="432" y1="110" x2="498" y2="110" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="100" fill="#8b98a5" font-size="11">2. fan-out</text>
  <line x1="690" y1="120" x2="736" y2="175" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="150" fill="#8b98a5" font-size="11">3. read</text>
  <line x1="595" y1="220" x2="595" y2="182" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="602" y="205" fill="#8b98a5" font-size="11">merge</text>
</svg>
