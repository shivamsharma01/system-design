<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 390" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Dropbox file sync architecture diagram">
  <rect width="880" height="390" fill="#0b1f3a" rx="12"/>
  <text x="440" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Dropbox: Chunk · Sync · Notify</text>

  <!-- Client A -->
  <g>
    <rect x="32" y="60" width="140" height="78" rx="10" fill="#13294b" stroke="#0061ff" stroke-width="2"/>
    <text x="102" y="92" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Client A</text>
    <text x="102" y="112" fill="#9bb3d4" font-size="11" text-anchor="middle">watcher + chunker</text>
  </g>

  <!-- Client B -->
  <g>
    <rect x="32" y="250" width="140" height="78" rx="10" fill="#13294b" stroke="#22c55e" stroke-width="2"/>
    <text x="102" y="282" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Client B</text>
    <text x="102" y="302" fill="#9bb3d4" font-size="11" text-anchor="middle">receives updates</text>
  </g>

  <!-- Block service -->
  <g>
    <rect x="220" y="55" width="180" height="90" rx="10" fill="#102544" stroke="#0061ff" stroke-width="2"/>
    <text x="310" y="86" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Block Service</text>
    <text x="310" y="106" fill="#9bb3d4" font-size="11" text-anchor="middle">dedup by hash</text>
    <text x="310" y="124" fill="#9bb3d4" font-size="11" text-anchor="middle">store chunks</text>
  </g>

  <!-- Block storage -->
  <g>
    <rect x="440" y="55" width="180" height="90" rx="10" fill="#102544" stroke="#a855f7" stroke-width="2"/>
    <text x="530" y="86" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Block Storage</text>
    <text x="530" y="106" fill="#9bb3d4" font-size="11" text-anchor="middle">S3 (immutable</text>
    <text x="530" y="124" fill="#9bb3d4" font-size="11" text-anchor="middle">content chunks)</text>
  </g>

  <!-- Metadata service -->
  <g>
    <rect x="220" y="170" width="180" height="90" rx="10" fill="#102544" stroke="#22c55e" stroke-width="2"/>
    <text x="310" y="201" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Metadata Service</text>
    <text x="310" y="221" fill="#9bb3d4" font-size="11" text-anchor="middle">file ’ chunk list</text>
    <text x="310" y="239" fill="#9bb3d4" font-size="11" text-anchor="middle">versions (MySQL)</text>
  </g>

  <!-- Notification -->
  <g>
    <rect x="440" y="170" width="180" height="90" rx="10" fill="#102544" stroke="#f59e0b" stroke-width="2"/>
    <text x="530" y="201" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Notification Svc</text>
    <text x="530" y="221" fill="#9bb3d4" font-size="11" text-anchor="middle">long-poll / push</text>
    <text x="530" y="239" fill="#9bb3d4" font-size="11" text-anchor="middle">"something changed"</text>
  </g>

  <!-- Sync/metadata DB -->
  <g>
    <rect x="660" y="115" width="180" height="90" rx="10" fill="#102544" stroke="#3b82f6" stroke-width="2"/>
    <text x="750" y="146" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Sync / Cursor</text>
    <text x="750" y="166" fill="#9bb3d4" font-size="11" text-anchor="middle">per-device cursor</text>
    <text x="750" y="184" fill="#9bb3d4" font-size="11" text-anchor="middle">delta since X</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9bb3d4"/>
    </marker>
  </defs>
  <line x1="172" y1="92" x2="218" y2="95" stroke="#0061ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="174" y="84" fill="#9bb3d4" font-size="10">1. upload chunks</text>
  <line x1="400" y1="100" x2="438" y2="100" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="172" y1="120" x2="218" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="165" fill="#9bb3d4" font-size="10">2. commit meta</text>
  <line x1="400" y1="215" x2="438" y2="215" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="404" y="207" fill="#9bb3d4" font-size="10">3. notify</text>
  <line x1="530" y1="260" x2="172" y2="285" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="300" fill="#9bb3d4" font-size="10">4. "changed" ’ poll delta</text>
  <line x1="620" y1="200" x2="658" y2="170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
