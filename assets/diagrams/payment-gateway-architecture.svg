<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Payment gateway architecture">
  <rect width="920" height="470" fill="#0b1020" rx="12"/>
  <text x="460" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Payment Gateway: Authorize ’ Capture ’ Settle</text>

  <defs>
    <marker id="pa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a5b4fc"/>
    </marker>
  </defs>

  <!-- Merchant -->
  <g>
    <rect x="28" y="180" width="120" height="100" rx="10" fill="#16203a" stroke="#4f46e5" stroke-width="2"/>
    <text x="88" y="214" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Merchant</text>
    <text x="88" y="234" fill="#9fb0d8" font-size="11" text-anchor="middle">checkout</text>
    <text x="88" y="250" fill="#9fb0d8" font-size="11" text-anchor="middle">+ SDK / API</text>
  </g>

  <!-- API / Payment Service -->
  <g>
    <rect x="180" y="150" width="170" height="160" rx="12" fill="#101830" stroke="#818cf8" stroke-width="2"/>
    <text x="265" y="176" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Payment Service</text>
    <text x="265" y="198" fill="#9fb0d8" font-size="11" text-anchor="middle">idempotency keys</text>
    <text x="265" y="215" fill="#9fb0d8" font-size="11" text-anchor="middle">orchestration (saga)</text>
    <text x="265" y="232" fill="#9fb0d8" font-size="11" text-anchor="middle">ledger writes</text>
    <rect x="200" y="248" width="130" height="48" rx="8" fill="#16203a" stroke="#34d399" stroke-width="1.5"/>
    <text x="265" y="268" fill="#fff" font-size="11" text-anchor="middle">state machine</text>
    <text x="265" y="284" fill="#9fb0d8" font-size="10" text-anchor="middle">auth’capture’settle</text>
  </g>

  <!-- Vault -->
  <g>
    <rect x="180" y="60" width="170" height="70" rx="10" fill="#101830" stroke="#f59e0b" stroke-width="2"/>
    <text x="265" y="90" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Token Vault (PCI)</text>
    <text x="265" y="110" fill="#9fb0d8" font-size="11" text-anchor="middle">tokenize PAN · KMS</text>
  </g>

  <!-- Ledger DB -->
  <g>
    <rect x="180" y="330" width="170" height="70" rx="10" fill="#101830" stroke="#34d399" stroke-width="2"/>
    <text x="265" y="360" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Ledger DB</text>
    <text x="265" y="380" fill="#9fb0d8" font-size="11" text-anchor="middle">double-entry · ACID</text>
  </g>

  <!-- Risk -->
  <g>
    <rect x="390" y="60" width="160" height="70" rx="10" fill="#101830" stroke="#f472b6" stroke-width="2"/>
    <text x="470" y="90" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Risk / Fraud</text>
    <text x="470" y="110" fill="#9fb0d8" font-size="11" text-anchor="middle">scoring · 3DS</text>
  </g>

  <!-- PSP Connectors -->
  <g>
    <rect x="390" y="180" width="160" height="110" rx="12" fill="#101830" stroke="#a5b4fc" stroke-width="2"/>
    <text x="470" y="206" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">PSP Connectors</text>
    <text x="470" y="228" fill="#9fb0d8" font-size="11" text-anchor="middle">normalize per acquirer</text>
    <text x="470" y="245" fill="#9fb0d8" font-size="11" text-anchor="middle">retries · failover</text>
    <text x="470" y="262" fill="#9fb0d8" font-size="11" text-anchor="middle">smart routing</text>
  </g>

  <!-- Webhooks -->
  <g>
    <rect x="390" y="330" width="160" height="70" rx="10" fill="#101830" stroke="#38bdf8" stroke-width="2"/>
    <text x="470" y="360" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Webhooks</text>
    <text x="470" y="380" fill="#9fb0d8" font-size="11" text-anchor="middle">async status events</text>
  </g>

  <!-- Acquirer / Card networks / banks -->
  <g>
    <rect x="600" y="150" width="290" height="170" rx="12" fill="#0e1730" stroke="#64748b" stroke-width="2"/>
    <text x="745" y="176" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">External Money Movement</text>
    <rect x="620" y="190" width="250" height="34" rx="6" fill="#16203a" stroke="#a5b4fc" stroke-width="1.2"/>
    <text x="745" y="212" fill="#cdd7f0" font-size="11" text-anchor="middle">Acquiring Bank / PSP</text>
    <rect x="620" y="232" width="250" height="34" rx="6" fill="#16203a" stroke="#a5b4fc" stroke-width="1.2"/>
    <text x="745" y="254" fill="#cdd7f0" font-size="11" text-anchor="middle">Card Networks (Visa / Mastercard)</text>
    <rect x="620" y="274" width="250" height="34" rx="6" fill="#16203a" stroke="#a5b4fc" stroke-width="1.2"/>
    <text x="745" y="296" fill="#cdd7f0" font-size="11" text-anchor="middle">Issuing Bank (cardholder)</text>
  </g>

  <!-- flows -->
  <line x1="148" y1="225" x2="178" y2="225" stroke="#a5b4fc" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="265" y1="150" x2="265" y2="132" stroke="#f59e0b" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="265" y1="310" x2="265" y2="328" stroke="#34d399" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="350" y1="200" x2="388" y2="220" stroke="#a5b4fc" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="350" y1="170" x2="388" y2="110" stroke="#f472b6" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="550" y1="225" x2="598" y2="225" stroke="#a5b4fc" stroke-width="2" marker-end="url(#pa)"/>
  <text x="574" y="216" fill="#9fb0d8" font-size="9" text-anchor="middle">auth</text>
  <!-- webhook back -->
  <path d="M600 290 C470 330 470 330 470 330" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#pa)"/>
  <path d="M390 360 C200 420 120 360 100 282" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#pa)"/>
  <text x="300" y="440" fill="#9fb0d8" font-size="10" text-anchor="middle">async settlement + webhook notifications back to merchant</text>
</svg>
