<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Zomato food delivery architecture diagram">
  <rect width="880" height="400" fill="#1c1c1c" rx="12"/>
  <text x="440" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Zomato: Discover ’ Order ’ Deliver</text>

  <!-- Customer -->
  <g>
    <rect x="32" y="70" width="130" height="76" rx="10" fill="#2a2a2a" stroke="#cb202d" stroke-width="2"/>
    <text x="97" y="104" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Customer</text>
    <text x="97" y="124" fill="#b0b0b0" font-size="11" text-anchor="middle">browse + order</text>
  </g>

  <!-- Search/Discovery -->
  <g>
    <rect x="210" y="58" width="170" height="92" rx="10" fill="#222" stroke="#22c55e" stroke-width="2"/>
    <text x="295" y="90" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Discovery / Search</text>
    <text x="295" y="110" fill="#b0b0b0" font-size="11" text-anchor="middle">Elasticsearch + geo</text>
    <text x="295" y="128" fill="#b0b0b0" font-size="11" text-anchor="middle">nearby + filters</text>
  </g>

  <!-- Order service -->
  <g>
    <rect x="210" y="180" width="170" height="92" rx="10" fill="#222" stroke="#f59e0b" stroke-width="2"/>
    <text x="295" y="212" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Order Service</text>
    <text x="295" y="232" fill="#b0b0b0" font-size="11" text-anchor="middle">state machine</text>
    <text x="295" y="250" fill="#b0b0b0" font-size="11" text-anchor="middle">+ payments</text>
  </g>

  <!-- Restaurant -->
  <g>
    <rect x="430" y="58" width="160" height="92" rx="10" fill="#222" stroke="#3b82f6" stroke-width="2"/>
    <text x="510" y="90" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Restaurant</text>
    <text x="510" y="110" fill="#b0b0b0" font-size="11" text-anchor="middle">accept + cook</text>
    <text x="510" y="128" fill="#b0b0b0" font-size="11" text-anchor="middle">KDS / partner app</text>
  </g>

  <!-- Dispatch -->
  <g>
    <rect x="430" y="180" width="160" height="92" rx="10" fill="#222" stroke="#a855f7" stroke-width="2"/>
    <text x="510" y="212" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Dispatch</text>
    <text x="510" y="232" fill="#b0b0b0" font-size="11" text-anchor="middle">assign rider</text>
    <text x="510" y="250" fill="#b0b0b0" font-size="11" text-anchor="middle">batch + ETA</text>
  </g>

  <!-- Location index -->
  <g>
    <rect x="640" y="180" width="200" height="92" rx="10" fill="#222" stroke="#22c55e" stroke-width="2"/>
    <text x="740" y="212" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Location Service</text>
    <text x="740" y="232" fill="#b0b0b0" font-size="11" text-anchor="middle">rider GPS index (H3)</text>
    <text x="740" y="250" fill="#b0b0b0" font-size="11" text-anchor="middle">Redis, in-memory</text>
  </g>

  <!-- Delivery partner -->
  <g>
    <rect x="640" y="58" width="200" height="92" rx="10" fill="#222" stroke="#22c55e" stroke-width="2"/>
    <text x="740" y="90" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Delivery Partner</text>
    <text x="740" y="110" fill="#b0b0b0" font-size="11" text-anchor="middle">pick up + drop</text>
    <text x="740" y="128" fill="#b0b0b0" font-size="11" text-anchor="middle">GPS pings</text>
  </g>

  <!-- Kafka bar -->
  <g>
    <rect x="210" y="306" width="630" height="56" rx="10" fill="#15202b" stroke="#6366f1" stroke-width="2"/>
    <text x="525" y="330" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Kafka  order events, tracking, notifications, analytics</text>
    <text x="525" y="350" fill="#b0b0b0" font-size="11" text-anchor="middle">decouples discovery · order · dispatch · payments</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b0b0b0"/>
    </marker>
  </defs>
  <line x1="162" y1="104" x2="208" y2="104" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="166" y="96" fill="#b0b0b0" font-size="10">1. search</text>
  <line x1="162" y1="120" x2="208" y2="210" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="170" fill="#b0b0b0" font-size="10">2. order</text>
  <line x1="380" y1="120" x2="428" y2="104" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="384" y="112" fill="#b0b0b0" font-size="10">3. notify</text>
  <line x1="380" y1="226" x2="428" y2="226" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="384" y="218" fill="#b0b0b0" font-size="10">4. dispatch</text>
  <line x1="590" y1="226" x2="638" y2="226" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="594" y="218" fill="#b0b0b0" font-size="10">nearby</text>
  <line x1="740" y1="180" x2="740" y2="152" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="746" y="170" fill="#b0b0b0" font-size="10">5. assign</text>
</svg>
