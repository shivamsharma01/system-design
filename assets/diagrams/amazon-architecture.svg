<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Amazon e-commerce architecture diagram">
  <rect width="880" height="400" fill="#131921" rx="12"/>
  <text x="440" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Amazon: Browse ’ Cart ’ Checkout ’ Fulfill</text>

  <!-- Shopper -->
  <g>
    <rect x="32" y="160" width="120" height="80" rx="10" fill="#232f3e" stroke="#ff9900" stroke-width="2"/>
    <text x="92" y="194" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Shopper</text>
    <text x="92" y="214" fill="#9aa7b4" font-size="11" text-anchor="middle">browse + buy</text>
  </g>

  <!-- Gateway -->
  <g>
    <rect x="180" y="160" width="110" height="80" rx="10" fill="#232f3e" stroke="#ff9900" stroke-width="2"/>
    <text x="235" y="194" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Gateway</text>
    <text x="235" y="214" fill="#9aa7b4" font-size="11" text-anchor="middle">+ BFF</text>
  </g>

  <!-- Catalog/search -->
  <g>
    <rect x="320" y="50" width="170" height="80" rx="10" fill="#1b2530" stroke="#22c55e" stroke-width="2"/>
    <text x="405" y="82" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Catalog / Search</text>
    <text x="405" y="102" fill="#9aa7b4" font-size="11" text-anchor="middle">Elasticsearch + cache</text>
  </g>

  <!-- Cart -->
  <g>
    <rect x="320" y="160" width="170" height="80" rx="10" fill="#1b2530" stroke="#3b82f6" stroke-width="2"/>
    <text x="405" y="192" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Cart Service</text>
    <text x="405" y="212" fill="#9aa7b4" font-size="11" text-anchor="middle">DynamoDB, AP</text>
  </g>

  <!-- Order/checkout -->
  <g>
    <rect x="320" y="270" width="170" height="80" rx="10" fill="#1b2530" stroke="#f59e0b" stroke-width="2"/>
    <text x="405" y="302" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Order / Checkout</text>
    <text x="405" y="322" fill="#9aa7b4" font-size="11" text-anchor="middle">saga orchestrator</text>
  </g>

  <!-- Inventory -->
  <g>
    <rect x="520" y="160" width="160" height="80" rx="10" fill="#1b2530" stroke="#ef4444" stroke-width="2"/>
    <text x="600" y="192" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Inventory</text>
    <text x="600" y="212" fill="#9aa7b4" font-size="11" text-anchor="middle">reserve (CP)</text>
  </g>

  <!-- Payment -->
  <g>
    <rect x="520" y="270" width="160" height="80" rx="10" fill="#1b2530" stroke="#a855f7" stroke-width="2"/>
    <text x="600" y="302" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Payment</text>
    <text x="600" y="322" fill="#9aa7b4" font-size="11" text-anchor="middle">authorize + capture</text>
  </g>

  <!-- Fulfillment -->
  <g>
    <rect x="710" y="215" width="140" height="80" rx="10" fill="#1b2530" stroke="#22c55e" stroke-width="2"/>
    <text x="780" y="247" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Fulfillment</text>
    <text x="780" y="267" fill="#9aa7b4" font-size="11" text-anchor="middle">warehouse + ship</text>
  </g>

  <!-- Kafka bar -->
  <g>
    <rect x="320" y="362" width="530" height="28" rx="8" fill="#15202b" stroke="#6366f1" stroke-width="2"/>
    <text x="585" y="380" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Kafka  order events, inventory, notifications, analytics</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa7b4"/>
    </marker>
  </defs>
  <line x1="152" y1="200" x2="178" y2="200" stroke="#ff9900" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="290" y1="180" x2="318" y2="100" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="288" y="140" fill="#9aa7b4" font-size="10">search</text>
  <line x1="290" y1="200" x2="318" y2="200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="290" y1="220" x2="318" y2="300" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="286" y="270" fill="#9aa7b4" font-size="10">checkout</text>
  <line x1="490" y1="300" x2="518" y2="210" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="494" y="250" fill="#9aa7b4" font-size="10">reserve</text>
  <line x1="490" y1="310" x2="518" y2="310" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="492" y="302" fill="#9aa7b4" font-size="10">pay</text>
  <line x1="680" y1="290" x2="708" y2="270" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="676" y="284" fill="#9aa7b4" font-size="10">ship</text>
</svg>
