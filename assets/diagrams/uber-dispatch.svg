<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Uber ride-hailing dispatch architecture diagram">
  <rect width="880" height="380" fill="#0d0d0d" rx="12"/>
  <text x="440" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Uber Dispatch &amp; Matching</text>

  <!-- Rider -->
  <g>
    <rect x="36" y="60" width="140" height="80" rx="10" fill="#1a1a1a" stroke="#276ef1" stroke-width="2"/>
    <text x="106" y="96" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Rider App</text>
    <text x="106" y="118" fill="#9aa0a6" font-size="12" text-anchor="middle">requests ride</text>
  </g>

  <!-- Driver -->
  <g>
    <rect x="36" y="240" width="140" height="80" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="2"/>
    <text x="106" y="276" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Driver App</text>
    <text x="106" y="298" fill="#9aa0a6" font-size="12" text-anchor="middle">GPS every 4s</text>
  </g>

  <!-- Gateway -->
  <g>
    <rect x="232" y="150" width="150" height="90" rx="10" fill="#15202b" stroke="#276ef1" stroke-width="2"/>
    <text x="307" y="186" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">API Gateway</text>
    <text x="307" y="208" fill="#9aa0a6" font-size="12" text-anchor="middle">WebSocket +</text>
    <text x="307" y="226" fill="#9aa0a6" font-size="12" text-anchor="middle">REST</text>
  </g>

  <!-- Location service -->
  <g>
    <rect x="430" y="240" width="190" height="100" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="2"/>
    <text x="525" y="276" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Location Service</text>
    <text x="525" y="298" fill="#9aa0a6" font-size="12" text-anchor="middle">geospatial index</text>
    <text x="525" y="316" fill="#9aa0a6" font-size="12" text-anchor="middle">(S2/geohash) in Redis</text>
  </g>

  <!-- Matching -->
  <g>
    <rect x="430" y="60" width="190" height="100" rx="10" fill="#1a1a1a" stroke="#f59e0b" stroke-width="2"/>
    <text x="525" y="96" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Matching / DISCO</text>
    <text x="525" y="118" fill="#9aa0a6" font-size="12" text-anchor="middle">find nearby + offer</text>
    <text x="525" y="136" fill="#9aa0a6" font-size="12" text-anchor="middle">ETA + surge</text>
  </g>

  <!-- Trip + supporting -->
  <g>
    <rect x="668" y="150" width="180" height="100" rx="10" fill="#1a1a1a" stroke="#a855f7" stroke-width="2"/>
    <text x="758" y="186" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Trip Store</text>
    <text x="758" y="208" fill="#9aa0a6" font-size="12" text-anchor="middle">state machine</text>
    <text x="758" y="226" fill="#9aa0a6" font-size="12" text-anchor="middle">Kafka events</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>
  <line x1="176" y1="100" x2="230" y2="170" stroke="#276ef1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="178" y="125" fill="#9aa0a6" font-size="11">1. request</text>
  <line x1="176" y1="280" x2="428" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="305" fill="#9aa0a6" font-size="11">pings</text>
  <line x1="382" y1="180" x2="428" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="384" y="135" fill="#9aa0a6" font-size="11">2. match</text>
  <line x1="525" y1="240" x2="525" y2="162" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="532" y="205" fill="#9aa0a6" font-size="11">nearby</text>
  <line x1="620" y1="110" x2="666" y2="170" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="628" y="150" fill="#9aa0a6" font-size="11">3. trip</text>
</svg>
