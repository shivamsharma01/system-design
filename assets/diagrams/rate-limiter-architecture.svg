<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Distributed rate limiter architecture">
  <rect width="900" height="420" fill="#06222b" rx="12"/>
  <text x="450" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Distributed Rate Limiter at the API Gateway</text>

  <defs>
    <marker id="rl" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <!-- Clients -->
  <g>
    <rect x="28" y="150" width="130" height="90" rx="10" fill="#0c3743" stroke="#0891b2" stroke-width="2"/>
    <text x="93" y="186" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Clients</text>
    <text x="93" y="206" fill="#a7d8e3" font-size="11" text-anchor="middle">apps · API keys</text>
    <text x="93" y="222" fill="#a7d8e3" font-size="11" text-anchor="middle">IPs · users</text>
  </g>

  <!-- Gateway with middleware -->
  <g>
    <rect x="210" y="120" width="200" height="160" rx="12" fill="#0a2e38" stroke="#22d3ee" stroke-width="2"/>
    <text x="310" y="148" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">API Gateway</text>

    <rect x="232" y="162" width="156" height="44" rx="8" fill="#0c3743" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="310" y="182" fill="#fff" font-size="12" text-anchor="middle">Rate-limit middleware</text>
    <text x="310" y="198" fill="#a7d8e3" font-size="10" text-anchor="middle">identify ’ check ’ decide</text>

    <rect x="232" y="216" width="74" height="44" rx="8" fill="#0c3743" stroke="#22c55e" stroke-width="1.5"/>
    <text x="269" y="240" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">allow</text>
    <text x="269" y="254" fill="#a7d8e3" font-size="10" text-anchor="middle">200</text>

    <rect x="314" y="216" width="74" height="44" rx="8" fill="#0c3743" stroke="#ef4444" stroke-width="1.5"/>
    <text x="351" y="240" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">reject</text>
    <text x="351" y="254" fill="#a7d8e3" font-size="10" text-anchor="middle">429</text>
  </g>

  <!-- Redis counter store -->
  <g>
    <rect x="470" y="120" width="180" height="100" rx="12" fill="#0a2e38" stroke="#f59e0b" stroke-width="2"/>
    <text x="560" y="150" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Redis (counters)</text>
    <text x="560" y="172" fill="#a7d8e3" font-size="11" text-anchor="middle">atomic Lua script</text>
    <text x="560" y="190" fill="#a7d8e3" font-size="11" text-anchor="middle">INCR / TTL / tokens</text>
    <text x="560" y="208" fill="#a7d8e3" font-size="11" text-anchor="middle">key per identity+window</text>
  </g>

  <!-- Upstream services -->
  <g>
    <rect x="712" y="120" width="160" height="100" rx="12" fill="#0c3743" stroke="#0891b2" stroke-width="2"/>
    <text x="792" y="160" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Upstream</text>
    <text x="792" y="182" fill="#a7d8e3" font-size="11" text-anchor="middle">services / APIs</text>
    <text x="792" y="200" fill="#a7d8e3" font-size="11" text-anchor="middle">(protected)</text>
  </g>

  <!-- Local cache note -->
  <g>
    <rect x="210" y="312" width="440" height="64" rx="10" fill="#0a2e38" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="430" y="338" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Per-node local token cache (best-effort)</text>
    <text x="430" y="357" fill="#a7d8e3" font-size="11" text-anchor="middle">cuts Redis round-trips; periodically syncs the shared counter</text>
  </g>

  <!-- Flows -->
  <line x1="158" y1="195" x2="208" y2="195" stroke="#67e8f9" stroke-width="2" marker-end="url(#rl)"/>
  <line x1="410" y1="184" x2="468" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#rl)"/>
  <text x="438" y="160" fill="#a7d8e3" font-size="9" text-anchor="middle">check</text>
  <line x1="468" y1="196" x2="412" y2="210" stroke="#f59e0b" stroke-width="2" marker-end="url(#rl)"/>
  <text x="440" y="224" fill="#a7d8e3" font-size="9" text-anchor="middle">count</text>
  <line x1="388" y1="238" x2="710" y2="180" stroke="#22c55e" stroke-width="2" marker-end="url(#rl)"/>
  <text x="560" y="232" fill="#22c55e" font-size="10" text-anchor="middle">allowed ’ forward</text>
  <line x1="310" y1="280" x2="310" y2="310" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#rl)"/>
  <line x1="560" y1="312" x2="560" y2="222" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#rl)"/>
</svg>
